name: CI - TypeScript

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Lint, Type-Check & Build (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --if-present
        # Advisory only, matching ci.yml. Pre-existing lint debt (452 errors) is
        # tracked for a dedicated cleanup; see docs/deathcare/DEATHCARE_LANDSCAPE.md.
        continue-on-error: true

      - name: Type check
        run: npx tsc --noEmit --pretty || true

      - name: Build
        run: npm run build

      - name: Test
        run: npm test --if-present
